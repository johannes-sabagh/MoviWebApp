{% extends "base.html" %}
{% block title %}Users — MovieApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">

        <h2 class="mb-4"><i class="bi bi-people-fill me-2"></i>Users</h2>

        <ul class="list-group list-group-flush mb-4">
            {% for user in users %}
            <li class="list-group-item bg-secondary text-light d-flex justify-content-between align-items-center rounded mb-2">
                <a href="{{ url_for('get_movies', user_id=user.id) }}" class="text-light text-decoration-none fw-semibold">
                    <i class="bi bi-person-circle me-2"></i>{{ user.name }}
                </a>
                <a href="{{ url_for('get_movies', user_id=user.id) }}" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-collection-play me-1"></i>Movies
                </a>
            </li>
            {% else %}
            <li class="list-group-item bg-secondary text-light rounded">No users yet. Add one below!</li>
            {% endfor %}
        </ul>

        <div class="card bg-secondary text-light border-0">
            <div class="card-body">
                <h5 class="card-title mb-3"><i class="bi bi-person-plus me-2"></i>Add User</h5>
                <form action="{{ url_for('add_user') }}" method="post" class="d-flex gap-2">
                    <input name="new_user" type="text" class="form-control bg-dark text-light border-secondary" placeholder="Enter username" required>
                    <button type="submit" class="btn btn-primary text-nowrap">Add</button>
                </form>
            </div>
        </div>

    </div>
</div>
{% endblock %}
